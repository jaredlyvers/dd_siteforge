# dd_staticbuilder TUI Theme Configuration
# Based on dd_framework color system
# Lookup order: ./theme.yml, ./.theme.yml, ~/.config/ldnddev/dd_staticbuilder/.theme.yml
#
# Core backgrounds:
# - base_background: App/window background
# - body_background: Panel/sidebar background
# - modal_background: Popup/modal/dialog background
#
# Text colors (dd_framework $c_text_*):
# - text: Primary text
# - subtext0: Secondary/muted text
# - text_disabled: Disabled text
# - text_inverse: Inverse text for contrast
#
# Selection:
# - selected_background: Selected row/item background
#
# Borders (dd_framework $c_support_*):
# - border_default: Default border color
# - border_active: Active section highlight
#
# Input field colors:
# - input_default: Default input border (default: blue #5ab4f5)
# - input_focus: Focused input border (default: lavender #8cc8ff)
#
# Accents (dd_framework $c_primary_*):
# - active: Active state color (default: #6ec8ff)
#
# Semantic colors (dd_framework $c_*_text dark variants):
# - success: Success messages
# - warning: Warning messages
# - error: Error messages
# - info: Info messages

colors:
  # Core backgrounds (dd_framework neutrals dark)
  base_background: "#0f1114"       # Main app background
  body_background: "#1a1c1f"       # Panel/sidebar background
  modal_background: "#2a2d31"      # Popup/modal background

  # Text colors (dd_framework text roles dark)
  text: "#f5f6f7"                  # Primary text
  subtext0: "#9ea3aa"              # Secondary/muted text
  text_disabled: "#5a5f66"         # Disabled text
  text_inverse: "#0f1114"          # Inverse text

  # Selection
  selected_background: "#2a2d31"   # Selected row background

  # Borders (dd_framework support dark)
  border_default: "#2a2d31"        # Default borders
  border_active: "#6ec8ff"         # Active section highlight

  # Input field colors (lavender for focus, blue for default)
  input_default: "#5ab4f5"         # Default input border (blue)
  input_focus: "#8cc8ff"           # Focused input border (lavender)

  # Accents (dd_framework primary action dark)
  active: "#6ec8ff"                # Active state highlight

  # Semantic colors (dd_framework status dark)
  success: "#82e0aa"               # Success
  warning: "#f5c469"               # Warning
  error: "#e57373"                 # Error
  info: "#5dade2"                  # Info
